server {
    listen 80;
    server_name hk-tools.yourdomain.com;  # Change to your domain or IP

    root /var/www/hk-tools;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Cache static assets
    location ~* \.(html|css|js|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1h;
        add_header Cache-Control "public, no-transform";
    }

    # Main location
    location / {
        try_files $uri $uri/ =404;
    }

    # Custom error pages
    error_page 404 /404.html;
    location = /404.html {
        root /var/www/hk-tools;
        internal;
    }

    # Logging
    access_log /var/log/nginx/hk-tools.access.log;
    error_log /var/log/nginx/hk-tools.error.log;
}
